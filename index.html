<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fruit Catch</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d1f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
    color: #fff;
  }
  #gc {
    position: relative;
    width: 500px;
    max-width: 100vw;
    user-select: none;
  }
  canvas {
    display: block;
    width: 100%;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    background: #080818;
    cursor: none;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 4px 6px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 70px;
  }
  .stat-label {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .stat-value {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }
  #combo-bar {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  #combo-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #1D9E75, #EF9F27, #D85A30);
    border-radius: 2px;
    transition: width 0.1s;
  }
</style>
</head>
<body>

<div id="gc">
  <div id="hud">
    <div class="stat"><span class="stat-label">Score</span><span class="stat-value" id="sc">0</span></div>
    <div class="stat"><span class="stat-label">Level</span><span class="stat-value" id="lv">1</span></div>
    <div class="stat"><span class="stat-label">Lives</span><span class="stat-value" id="li">❤️❤️❤️</span></div>
    <div class="stat"><span class="stat-label">Time</span><span class="stat-value" id="tm">60</span></div>
  </div>
  <div id="combo-bar"><div id="combo-fill"></div></div>
  <canvas id="cv" width="500" height="420"></canvas>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = 500, H = 420;
cv.width = W; cv.height = H;

const BW = 70, BH = 28;
const MAX_LEVEL = 8;   // FIX: cap level so spawnInterval never goes <= 0
const MAX_COMBO = 10;  // FIX: cap combo multiplier

/*
  BUGS FIXED:
  1. Invalid hex colors — bomb glow was '#555' (3-digit). Appending 'cc'/'44'/'00'
     gives '#555cc' which is an invalid CSS color. createRadialGradient's
     addColorStop throws, corrupting the canvas context → crash at ~400 score
     (when bombs become more frequent). All glow colors are now full 6-digit hex.
  2. Unbounded level — level was uncapped. At level 9+ spawnInterval() returned
     <= 0, causing spawnItem() every single frame, flooding items[] → crash.
     Level is now capped at MAX_LEVEL (8).
  3. Unbounded combo — combo grew forever, making pts = 10 * combo produce
     enormous score jumps. Capped at MAX_COMBO (10).
  4. Gradient try/catch safety net added as a defensive measure.
*/

const FRUITS = [
  { emoji: '🍎', glow: '#e63946' },
  { emoji: '🍊', glow: '#f4803a' },
  { emoji: '🍋', glow: '#f9d71c' },
  { emoji: '🍇', glow: '#7b2d8b' },
  { emoji: '🍓', glow: '#e63946' },
  { emoji: '🫐', glow: '#4361ee' },
  { emoji: '🍑', glow: '#f4803a' },
  { emoji: '🍍', glow: '#f9d71c' },
  { emoji: '🍉', glow: '#2dc653' },
  { emoji: '🥝', glow: '#2dc653' },
];
const BOMB = { emoji: '💣', glow: '#888888' }; // was '#555' → invalid when concatenated

/* ── game state ── */
let state = 'menu';
let score, lives, level, timeLeft, items, basket, combo, comboTimer, particles, floaters;
let lastTime = 0, spawnTimer = 0, timerAcc = 0;

function init() {
  score = 0; lives = 3; level = 1; timeLeft = 60;
  items = []; particles = []; floaters = [];
  combo = 0; comboTimer = 0;
  basket = { x: W / 2, tx: W / 2 };
  spawnTimer = 0; timerAcc = 0;
}

function spawnInterval() { return Math.max(420, 1200 - level * 110); } // always >= 420ms
function dropSpeed()     { return 2.5 + level * 0.55; }

function spawnItem() {
  const isBomb = Math.random() < 0.10 + level * 0.018;
  const src = isBomb ? BOMB : FRUITS[Math.floor(Math.random() * FRUITS.length)];
  const size = isBomb ? 30 : 28 + Math.floor(Math.random() * 8);
  items.push({
    x: 28 + Math.random() * (W - 56),
    y: -38,
    emoji: src.emoji,
    glow: src.glow,
    size,
    speed: dropSpeed() * (0.8 + Math.random() * 0.4),
    rot: (Math.random() - 0.5) * 0.08,
    angle: 0,
    wobble: Math.random() * Math.PI * 2,
    isBomb,
  });
}

function spawnParticles(x, y, color, n) {
  n = n || 10;
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i / n) + Math.random() * 0.6;
    const sp = 2 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2, life: 1, color });
  }
}
function spawnFloater(x, y, text, color) {
  floaters.push({ x, y, text, color: color || '#1D9E75', life: 1, vy: -1.6 });
}

/* ── input ── */
cv.addEventListener('mousemove', function(e) {
  const r = cv.getBoundingClientRect();
  basket.tx = (e.clientX - r.left) * (W / r.width);
});
cv.addEventListener('touchmove', function(e) {
  e.preventDefault();
  const r = cv.getBoundingClientRect();
  basket.tx = (e.touches[0].clientX - r.left) * (W / r.width);
}, { passive: false });
cv.addEventListener('click',    function() { if (state !== 'play') { init(); state = 'play'; } });
cv.addEventListener('touchend', function() { if (state !== 'play') { init(); state = 'play'; } });

/* ── stars ── */
const _stars = Array.from({ length: 70 }, function() {
  return { x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.5 + 0.3, a: Math.random() };
});
function drawStars() {
  for (let i = 0; i < _stars.length; i++) {
    const s = _stars[i];
    ctx.globalAlpha = 0.25 + s.a * 0.55;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/* ── emoji with glow (safe gradient) ── */
function drawEmoji(emoji, glowColor, x, y, size) {
  ctx.save();
  try {
    const r = size * 0.72;
    const inner = Math.max(0, r * 0.1);
    // glowColor must be 6-digit hex; all entries above satisfy this
    const grad = ctx.createRadialGradient(x, y, inner, x, y, r);
    grad.addColorStop(0,    glowColor + 'cc');
    grad.addColorStop(0.55, glowColor + '44');
    grad.addColorStop(1,    glowColor + '00');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  } catch(err) {
    // fallback if gradient fails for any reason
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = glowColor;
    ctx.beginPath();
    ctx.arc(x, y, size * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(x, y, size * 0.46, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.font = size + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, x, y + size * 0.04);
  ctx.restore();
}

function drawBasket(cx, by) {
  const bx = cx - BW / 2;
  ctx.save();
  const g = ctx.createLinearGradient(bx, by, bx, by + BH);
  g.addColorStop(0, '#a0522d');
  g.addColorStop(1, '#5d2e0a');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(bx + 6, by);
  ctx.lineTo(bx + BW - 6, by);
  ctx.quadraticCurveTo(bx + BW + 2, by + BH, bx + BW - 10, by + BH);
  ctx.lineTo(bx + 10, by + BH);
  ctx.quadraticCurveTo(bx - 2, by + BH, bx + 6, by);
  ctx.fill();
  ctx.strokeStyle = '#3d1a04';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.13)';
  for (let i = 1; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(bx + i * BW / 4, by + 2);
    ctx.lineTo(bx + (i - 0.3) * BW / 4 + 2, by + BH - 2);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.fillRect(bx + 4, by, BW - 8, 4);
  ctx.restore();
}

/* ── update ── */
function update(dt) {
  basket.x += (basket.tx - basket.x) * 0.18;
  basket.x = Math.max(BW / 2, Math.min(W - BW / 2, basket.x));

  spawnTimer += dt;
  if (spawnTimer > spawnInterval()) { spawnItem(); spawnTimer = 0; }

  timerAcc += dt;
  if (timerAcc >= 1000) { timeLeft--; timerAcc = 0; }
  if (timeLeft <= 0) { state = 'over'; return; }

  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }

  const by = H - 50;
  const nextItems = [];
  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    it.y += it.speed * (dt / 16);
    it.angle += it.rot;
    it.wobble += 0.04;

    const caught =
      Math.abs(it.x - basket.x) < BW / 2 + 4 &&
      it.y + it.size / 2 > by &&
      it.y - it.size / 2 < by + BH;

    if (caught) {
      if (it.isBomb) {
        lives--;
        combo = 0;
        spawnFloater(it.x, by - 20, '-1 LIFE!', '#E24B4A');
        spawnParticles(it.x, by, '#E24B4A', 14);
        if (lives <= 0) state = 'over';
      } else {
        combo = Math.min(combo + 1, MAX_COMBO); // capped
        comboTimer = 2000;
        const mult = combo >= 3 ? combo : 1;
        const pts = 10 * mult;
        score += pts;
        level = Math.min(Math.floor(score / 200) + 1, MAX_LEVEL); // capped
        const col = combo >= 6 ? '#D85A30' : combo >= 3 ? '#EF9F27' : '#1D9E75';
        spawnFloater(it.x, by - 20, combo >= 3 ? ('x' + combo + '! +' + pts) : ('+' + pts), col);
        spawnParticles(it.x, by, col, 10);
      }
    } else if (it.y > H + 24) {
      if (!it.isBomb) combo = 0;
    } else {
      nextItems.push(it);
    }
  }
  items = nextItems;

  const nextP = [];
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.04;
    if (p.life > 0) nextP.push(p);
  }
  particles = nextP;

  const nextF = [];
  for (let i = 0; i < floaters.length; i++) {
    const f = floaters[i];
    f.y += f.vy; f.life -= 0.025;
    if (f.life > 0) nextF.push(f);
  }
  floaters = nextF;
}

/* ── render ── */
function drawGame() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  const by = H - 50;
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  ctx.fillRect(0, by + BH, W, H - by - BH);

  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    ctx.save();
    ctx.translate(it.x + Math.sin(it.wobble) * 3, it.y);
    ctx.rotate(it.angle);
    drawEmoji(it.emoji, it.glow, 0, 0, it.size);
    ctx.restore();
  }

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  for (let i = 0; i < floaters.length; i++) {
    const f = floaters[i];
    ctx.globalAlpha = f.life;
    ctx.font = '600 14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;

  drawBasket(basket.x, by);

  document.getElementById('sc').textContent = score;
  document.getElementById('lv').textContent = level;
  document.getElementById('li').textContent = '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, 3 - lives));
  document.getElementById('tm').textContent = timeLeft;
  document.getElementById('combo-fill').style.width = Math.min(100, combo * 10) + '%';
}

/* ── overlay screens ── */
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y); c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

function overlay(lines) {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, W, H);
  drawStars();
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  roundRect(ctx, W / 2 - 165, H / 2 - 135, 330, 270, 16);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.10)';
  ctx.lineWidth = 0.5;
  roundRect(ctx, W / 2 - 165, H / 2 - 135, 330, 270, 16);
  ctx.stroke();
  ctx.textAlign = 'center';
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i];
    ctx.font = l.font;
    ctx.fillStyle = l.color || 'rgba(255,255,255,0.55)';
    ctx.fillText(l.text, W / 2, H / 2 + l.y);
  }
}

function drawMenu() {
  overlay([
    { font: '48px serif',          text: '🧺',                                   y: -90, color: '#ffffff' },
    { font: '600 26px system-ui',  text: 'Fruit Catch',                           y: -44, color: '#ffffff' },
    { font: '14px system-ui',      text: 'Move your mouse to control the basket', y: -12 },
    { font: '14px system-ui',      text: 'Catch fruits  ·  Avoid bombs 💣',       y:  14 },
    { font: '14px system-ui',      text: 'Chain catches for combo points!',        y:  40 },
    { font: '600 16px system-ui',  text: 'Click or tap to start',                 y: 100, color: '#1D9E75' },
  ]);
}

function drawOver() {
  const medal = score >= 800 ? '🥇' : score >= 400 ? '🥈' : '🥉';
  overlay([
    { font: '44px serif',          text: medal,                       y: -86, color: '#ffffff' },
    { font: '600 24px system-ui',  text: 'Game Over!',                y: -42, color: '#ffffff' },
    { font: '13px system-ui',      text: 'Final Score',               y: -10 },
    { font: '600 36px system-ui',  text: String(score),               y:  30, color: score >= 400 ? '#EF9F27' : '#ffffff' },
    { font: '13px system-ui',      text: 'Level reached: ' + level,   y:  60 },
    { font: '600 15px system-ui',  text: 'Click or tap to play again',y: 100, color: '#1D9E75' },
  ]);
}

/* ── main loop ── */
function loop(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  if (state === 'menu')      drawMenu();
  else if (state === 'over') drawOver();
  else                       { update(dt); drawGame(); }
  requestAnimationFrame(loop);
}

state = 'menu';
requestAnimationFrame(function(ts) { lastTime = ts; loop(ts); });
</script>
</body>
</html>
